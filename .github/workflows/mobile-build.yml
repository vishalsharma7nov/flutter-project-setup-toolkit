name: Mobile build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-android:
    name: Build Android (studio_app)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Resolve dependencies
        working-directory: studio_app
        run: flutter pub get

      - name: Analyze studio_app
        working-directory: studio_app
        run: flutter analyze lib

      - name: Test studio_app
        working-directory: studio_app
        run: flutter test

      - name: Build Android release APK
        working-directory: studio_app
        run: flutter build apk --release

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: studio-app-android-apk
          path: studio_app/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  build-ios:
    name: Build iOS (studio_app)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Resolve dependencies
        working-directory: studio_app
        run: flutter pub get

      - name: Analyze studio_app
        working-directory: studio_app
        run: flutter analyze lib

      - name: Test studio_app
        working-directory: studio_app
        run: flutter test

      - name: Build iOS release (no codesign)
        working-directory: studio_app
        run: flutter build ios --release --no-codesign

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: studio-app-ios
          path: studio_app/build/ios/iphoneos/Runner.app
          if-no-files-found: error
